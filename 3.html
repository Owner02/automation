<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персонал — Restaurant ERP</title>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --surface-hover: #273549;
            --accent: #f59e0b; --accent-hover: #fbbf24; --text: #e2e8f0;
            --muted: #94a3b8; --border: #334155; --success: #22c55e;
            --danger: #ef4444; --warning: #f59e0b; --info: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: var(--surface); padding: 24px 16px; border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
        .sidebar-logo { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--accent); text-decoration: none; display: block; }
        .sidebar-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
        .sidebar nav { display: flex; flex-direction: column; gap: 4px; }
        .sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 14px; color: var(--muted); text-decoration: none; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        .sidebar nav a:hover, .sidebar nav a.active { background: var(--surface-hover); color: var(--text); }
        .main { margin-left: 250px; flex: 1; padding: 24px 32px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .topbar h1 { font-size: 26px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-header h3 { font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
        .tag { padding: 3px 10px; border-radius: 14px; font-size: 11px; font-weight: 600; display: inline-block; }
        .tag-danger { background: #7f1d1d; color: #fca5a5; }
        .tag-success { background: #14532d; color: #86efac; }
        .tag-warning { background: #713f12; color: #fde68a; }
        .tag-info { background: #1e3a5f; color: #93c5fd; }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-accent:hover { background: var(--accent-hover); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-ghost:hover { background: var(--surface-hover); }
        .btn-sm { padding: 6px 12px; font-size: 11px; }
        .progress-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        input, select, textarea { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; }
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 16px 8px; }
            .sidebar nav a span:not(.icon), .sidebar-logo, .sidebar-subtitle { display: none; }
            .sidebar nav a { justify-content: center; }
            .main { margin-left: 60px; padding: 16px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <a href="index.html" class="sidebar-logo">👨‍🍳 Персонал</a>
        <p class="sidebar-subtitle">Управление рестораном</p>
        <nav>
            <a href="#" class="active" data-view="menu"><span class="icon">📋</span> <span>Меню и техкарты</span></a>
            <a href="#" data-view="hr"><span class="icon">👥</span> <span>Сотрудники (HR)</span></a>
            <a href="#" data-view="shifts"><span class="icon">🔄</span> <span>Биржа смен</span></a>
            <a href="#" data-view="gamification"><span class="icon">🏆</span> <span>Геймификация</span></a>
        </nav>
    </aside>
    <main class="main">
        <div class="topbar"><h1>👨‍🍳 Панель персонала</h1></div>

        <!-- Menu View -->
        <div class="view-panel active" id="view-menu">
            <div class="card">
                <div class="card-header">
                    <h3>📋 Меню ресторана</h3>
                    <div class="flex-row">
                        <select id="restaurantFilter" onchange="filterMenu()">
                            <option>Все рестораны</option><option>Центральный</option><option>Парковый</option><option>Набережный</option>
                        </select>
                        <button class="btn btn-accent btn-sm" onclick="openTechCardModal()">+ Блюдо</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>Блюдо</th><th>Себестоимость</th><th>Цена</th><th>Маржа</th><th>Рестораны</th><th></th></tr></thead>
                    <tbody id="menuBody"></tbody>
                </table>
            </div>
        </div>

        <!-- HR View -->
        <div class="view-panel" id="view-hr">
            <div class="card">
                <div class="card-header"><h3>👥 Сотрудники</h3></div>
                <table><thead><tr><th>Имя</th><th>Должность</th><th>Медкнижка</th><th>Статус</th></tr></thead><tbody id="staffTableBody"></tbody></table>
            </div>
        </div>

        <!-- Shifts View -->
        <div class="view-panel" id="view-shifts">
            <div class="card">
                <div class="card-header"><h3>🔄 Биржа смен</h3></div>
                <div id="shiftRequests"></div>
            </div>
        </div>

        <!-- Gamification View -->
        <div class="view-panel" id="view-gamification">
            <div class="card">
                <div class="card-header"><h3>🏆 Рейтинг официантов (сеть)</h3></div>
                <div id="gamificationBoard"></div>
            </div>
        </div>
    </main>
</div>

<!-- Tech Card Modal -->
<div class="modal-overlay" id="techCardModal">
    <div class="modal">
        <h3>📝 Технико-технологическая карта</h3>
        <div class="form-group"><label>Название блюда</label><input type="text" id="dishName" value="Салат Цезарь"></div>
        <div class="form-group"><label>Ингредиенты (брутто/нетто)</label><textarea id="ingredients" rows="4">Куриное филе: 150г/120г (потери 20%)
Салат Романо: 80г/75г (потери 6%)
Соус Цезарь: 50г/50г
Пармезан: 20г/20г
Гренки: 30г/30г</textarea></div>
        <div class="form-group"><label>Модификаторы</label>
            <select multiple style="height:80px;">
                <option>Без курицы (-30% себестоимости)</option><option>Двойная порция (+60%)</option><option>Без гренок</option>
            </select>
        </div>
        <div class="flex-row" style="justify-content:flex-end;">
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('techCardModal').classList.remove('active')">Отмена</button>
            <button class="btn btn-accent btn-sm" onclick="saveTechCard()">💾 Сохранить</button>
        </div>
    </div>
</div>

<script>
    const MENU = [
        { name: 'Салат Цезарь', cost: 180, price: 450, margin: 60, restaurants: ['Центральный','Парковый','Набережный'], modifiers: ['Без курицы','Двойная порция'] },
        { name: 'Борщ', cost: 95, price: 290, margin: 67, restaurants: ['Центральный','Парковый'], modifiers: ['Со сметаной'] },
        { name: 'Стейк Рибай', cost: 650, price: 1450, margin: 55, restaurants: ['Центральный','Набережный'], modifiers: ['Rare','Medium','Well Done'] },
        { name: 'Пицца Маргарита', cost: 210, price: 520, margin: 60, restaurants: ['Парковый','Набережный'], modifiers: ['Без сыра','Острый соус'] },
    ];
    const STAFF = [
        { name: 'Анна Кузнецова', role: 'Официант', medbook: '2026-09-15', status: 'active' },
        { name: 'Иван Петров', role: 'Повар', medbook: '2026-04-20', status: 'warning' },
        { name: 'Ольга Сидорова', role: 'Менеджер', medbook: '2027-01-10', status: 'active' },
        { name: 'Дмитрий Волков', role: 'Стажёр', medbook: '—', status: 'danger' },
    ];
    const SHIFTS = [
        { from: 'Анна К.', to: 'Елена М.', date: '2026-06-22', status: 'pending' },
        { from: 'Иван П.', to: 'Сергей К.', date: '2026-06-23', status: 'approved' },
    ];
    const WAITERS = [
        { name: 'Анна К.', avgCheck: 3200, tips: 18000, sales: 12, rank: 1 },
        { name: 'Елена М.', avgCheck: 2800, tips: 14500, sales: 8, rank: 2 },
        { name: 'Алексей Д.', avgCheck: 4100, tips: 22000, sales: 15, rank: 3 },
    ];

    function renderMenu(filter = 'Все рестораны') {
        const filtered = filter === 'Все рестораны' ? MENU : MENU.filter(m => m.restaurants.includes(filter));
        document.getElementById('menuBody').innerHTML = filtered.map(m => `
            <tr>
                <td><strong>${m.name}</strong><br><small style="color:var(--muted)">${m.modifiers.join(', ')}</small></td>
                <td>${m.cost} ₽</td><td>${m.price} ₽</td>
                <td style="color:${m.margin > 60 ? 'var(--success)' : 'var(--warning)'}">${m.margin}%</td>
                <td>${m.restaurants.map(r => `<span class="tag tag-${r==='Центральный'?'success':r==='Парковый'?'warning':'info'}">${r}</span>`).join(' ')}</td>
                <td><button class="btn btn-ghost btn-sm" onclick="openTechCardModal('${m.name}')">✏️</button></td>
            </tr>
        `).join('');
    }

    function renderStaff() {
        document.getElementById('staffTableBody').innerHTML = STAFF.map(s => `
            <tr>
                <td>${s.name}</td><td>${s.role}</td>
                <td>${s.medbook} ${s.medbook !== '—' && new Date(s.medbook) < new Date('2026-08-01') ? '<span class="tag tag-danger">⚠️ Скоро дедлайн</span>' : ''}</td>
                <td><span class="tag tag-${s.status==='active'?'success':s.status==='warning'?'warning':'danger'}">${s.status==='active'?'✅ Активен':s.status==='warning'?'⚠️ Проверить':'🚫 Стажёр'}</span></td>
            </tr>
        `).join('');
    }

    function renderShifts() {
        document.getElementById('shiftRequests').innerHTML = SHIFTS.map(s => `
            <div style="background:var(--surface-hover); border-radius:10px; padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><strong>${s.from}</strong> → <strong>${s.to}</strong> | 📅 ${s.date}</div>
                <div>${s.status==='pending'
                    ? '<button class="btn btn-accent btn-sm" onclick="this.closest(\'div\').querySelector(\'div\').innerHTML=\'✅ Одобрено\'">Одобрить</button> <button class="btn btn-ghost btn-sm" onclick="this.closest(\'div\').querySelector(\'div\').innerHTML=\'❌ Отклонено\'">Отклонить</button>'
                    : '✅ Одобрено'}</div>
            </div>
        `).join('');
    }

    function renderGamification() {
        document.getElementById('gamificationBoard').innerHTML = WAITERS.map(w => `
            <div style="display:flex; align-items:center; gap:16px; margin-bottom:14px; padding:14px; background:var(--surface-hover); border-radius:10px;">
                <div style="font-size:28px;">${w.rank===1?'🥇':w.rank===2?'🥈':'🥉'}</div>
                <div style="flex:1;"><strong>${w.name}</strong><br><small style="color:var(--muted);">Ср. чек: ${w.avgCheck}₽ | Чаевые: ${w.tips}₽</small></div>
                <div style="text-align:right;"><div style="color:var(--accent); font-weight:700;">${w.sales*100} баллов</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(w.sales/20*100,100)}%; background:var(--accent);"></div></div></div>
            </div>
        `).join('');
    }

    function openTechCardModal(name = '') {
        if (name) document.getElementById('dishName').value = name;
        document.getElementById('techCardModal').classList.add('active');
    }

    function saveTechCard() {
        document.getElementById('techCardModal').classList.remove('active');
        alert('✅ Техкарта сохранена!');
    }

    function filterMenu() { renderMenu(document.getElementById('restaurantFilter').value); }

    function switchView(viewName) {
        document.querySelectorAll('.sidebar nav a').forEach(l => l.classList.remove('active'));
        const link = document.querySelector(`.sidebar nav a[data-view="${viewName}"]`);
        if (link) link.classList.add('active');
        document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('view-' + viewName).classList.add('active');
    }

    document.querySelectorAll('.sidebar nav a').forEach(link => {
        link.addEventListener('click', (e) => { e.preventDefault(); switchView(link.dataset.view); });
    });

    renderMenu(); renderStaff(); renderShifts(); renderGamification();
</script>
</body>
</html>
